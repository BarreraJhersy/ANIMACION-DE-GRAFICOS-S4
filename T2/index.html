<html>
    <head>
        <title> LUGARES TURISTICOS </title>
        <style> 
            *{
                margin:0px;
                padding:0px;
            }
            .contenedor{
                width: 450px;
                height: 800px;
                background-color: rgb(250, 250, 78);
                margin: 0 auto;
                position: relative;
                overflow: hidden;
                top:65px;
                border-radius: 15px;
            }
            .palmeras{
                width: 300px;
                height: 250px;
                position: absolute;
                top: 0px;
                left: 250px;
                animation: palmeras 3s infinite;
                background-image: url(img/palmeras.png);
                background-size: cover;
            }
            @keyframes palmeras{
                0%{
                    top: 0px;
                    left: 250px;
                    transform: rotate(-65deg);
                }
                50%{
                    top: 0px;
                    left: 250px;
                    transform: rotate(-55deg);
                }
                100%{
                    top:0px;
                    left:250px;
                    transform: rotate(-65deg);
                }
            }
            h1 {
                margin: 0;           /* Quita el espacio que el navegador pone por defecto */
                line-height: 0.8;    /* Ajusta este número (0.8, 0.9, 1.1) para pegar las letras */
            }      
            .text1{
                position: relative;
                top: 320px;
                font-family: 'Caveat Brush',cursive;
                text-transform: uppercase; 
                letter-spacing: 5px;    
                font-weight: bold;
                color: #4b3621;
                animation: text1 0.5s forwards, text1B 0.5s forwards 2.5s;
            }
            @keyframes text1 {
                0%{
                    top:320px;
                    left: -300px;
                }
                100%{
                    top:320px;
                    left:20px; 
                }
            } 
            @keyframes text1B {
                0%{
                    top:320px;
                    left:20px; 
                }
                100%{
                    top:320px;
                    left:450px; 
                }
            }
            .text2{
                position: relative;
                top: 320px;
                left: -300px;
                font-family: 'Arial',sans-serif;
                text-transform: uppercase; 
                letter-spacing: 5px;    
                font-weight: bold;
                color: white;
                animation: text2 1s forwards, text2B 0.5s forwards  2.7s;
                font-size: 35px;
            }
            @keyframes text2 {
                0%{
                    top:320px;
                    left: -300px;
                }
                100%{
                    top:320px;
                    left:20px; 
                }
            }
            @keyframes text2B {
                0%{
                    top:320px;
                    left:20px; 
                }
                100%{
                    top:320px;
                    left:450px; 
                }
            } 
            .text3{
                position: relative;
                top: 310px;
                left: -300px;
                font-family: 'Arial',sans-serif;
                text-transform: uppercase; 
                letter-spacing: 5px;    
                font-weight: bold;
                color: white;
                animation: text3 1.5s forwards, text3B 0.5s forwards 2.9s;
                font-size: 35px;
            }
            @keyframes text3 {
                0%{
                    top: 320px;
                    left: -300px;
                }
                100%{
                    top:320px;
                    left:20px; 
                }
            }
            @keyframes text3B {
                0%{
                    top:320px;
                    left:20px; 
                }
                100%{
                    top:320px;
                    left:450px; 
                }
            }
            .coco1{
                width: 100px;
                height: 100px;
                position: absolute;
                top: 0px;
                left: 330px;
                animation: coco1S 3s forwards, coco1B 1s forwards 3s;
                background-image: url(img/medio_coco.png);
                background-size: cover;
            }
            @keyframes coco1S {
                0%{
                    top: -100px;
                    left: 330px;
                }
                100%{
                    top: 0px;
                    left: 330px;
                }
            }
            @keyframes coco1B {
                0%{
                    top: 0px;
                    left: 330px;
                }
                100%{
                    top: 900px;
                    left: 330px;
                }
            }
            .coco2{
                width: 300px;
                height: 300px;
                position: absolute;
                top: 0px;
                left: 300px;
                animation: coco2S 1s forwards, coco2B 1s forwards 2s;
                background-image: url(img/medio_coco.png);
                background-size: cover; 
            }
            @keyframes coco2S {
                0%{
                    top: -100px;
                    left: 250px;
                }
                100%{
                    top: 680px;
                    left: 250px;
                }
            }
            @keyframes coco2B {
                0%{
                    top: 680px;
                    left: 250px;
                }
                100%{
                    top: 900px;
                    left: 250px;
                }
            }
            .coco3{
                width: 150px;
                height: 150px;
                position: absolute;
                top: -200px;
                left: 0px;
                animation: coco3S 1s forwards 0.3s, coco3B 1s forwards 2.5s;
                background-image: url(img/medio_coco.png);
                background-size: cover; 
            }
            @keyframes coco3S {
                0%{
                    top: -200px;
                    left: 0px;
                }
                100%{
                    top: 600px;
                    left: 0px;
                }
            }
            @keyframes coco3B {
                0%{
                    top: 600px;
                    left: 0px;
                }
                100%{
                    top: 900px;
                    left: 0px;
                }
            }
            .coco4{
                width: 150px;
                height: 150px;
                position: absolute;
                top: -200px;
                left: 220px;
                animation: coco4S 1s forwards 0.5s, coco4B 1s forwards 2.5s;
                background-image: url(img/medio_coco.png);
                background-size: cover; 
            }
            @keyframes coco4S {
                0%{
                    top: -200px;
                    left: 220px;
                }
                100%{
                    top: 420px;
                    left: 220px;
                }
            }
            @keyframes coco4B {
                0%{
                    top: 420px;
                    left: 220px;
                }
                100%{
                    top: 900px;
                    left: 220px;
                }
            }
            .coco5{
                width: 150px;
                height: 150px;
                position: absolute;
                top: -200px;
                left: 180px;
                animation: coco5S 1s forwards 0.8s, coco5B 1s forwards 3s;
                background-image: url(img/medio_coco.png);
                background-size: cover; 
            }
            @keyframes coco5S {
                0%{
                    top: -200px;
                    left: 100px;
                }
                100%{
                    top: 180px;
                    left: 100px;
                }
            }
            @keyframes coco5B {
                0%{
                    top: 180px;
                    left: 100px;
                }
                100%{
                    top: 900px;
                    left: 100px;
                }
            }
            .t1{
                position: absolute;
                top: 300px;
                left: 450px;
                font-family: 'Arial',sans-serif;
                text-transform: uppercase; 
                letter-spacing: 5px;    
                font-weight: bold;
                color: white;
                animation: t1 1s forwards 3s, t1B 0.5s forwards 5s;
                font-size: 60px;
            }
            @keyframes t1 {
                0%{
                    top:300px;
                    left:450px;
                }
                100%{
                    top:300px;
                    left:35px;
                }
            }
            @keyframes t1B {
                0%{
                    top:300px;
                    left:35px;
                }
                100%{
                    top:200px;
                    left:35px;
                }
            }
            .t2{
                position: absolute;
                top: 380px;
                left: 450px;
                font-family: 'Arial',sans-serif;
                text-transform: uppercase; 
                letter-spacing: 5px;    
                color: rgb(255, 0, 0);
                animation: t2 1s forwards 3.25s;
                font-size: 40px;
            }
            @keyframes t2 {
                0%{
                    top:380px;
                    left:450px;
                }
                100%{
                    top:380px;
                    left:210px;
                }
            }
            .t3{
                position: absolute;
                top: 450px;
                left: 450px;
                font-family: 'Arial',sans-serif;
                text-transform: uppercase; 
                letter-spacing: 5px;    
                font-weight: bold;
                color: white;
                animation: t3 1s forwards 3.5s, t3B 0.5s forwards  5s;
                font-size: 40px;
            }
            @keyframes t3 {
                0%{
                    top:450px;
                    left:450px;
                }
                100%{
                    top:450px;
                    left:30px;
                }
            }
            @keyframes t3B {
                0%{
                    top:450px;
                    left:30px;
                }
                100%{
                    top:550px;
                    left:35px;
                }
            }
            .coco6{
                width: 300px;
                height: 300px;
                position: absolute;
                top: 260px;
                left: 90px;
                animation: coco6 1s forwards 5s;
                background-image: url(img/coco_entero.png);
                background-size: cover; 
                transform: scale(0);
            }
            @keyframes coco6 {
                0%{
                    top: 260px;
                    left: 90px;
                    transform: scale(0);
                }
                100%{
                    top: 260px;
                    left: 90px;
                    transform: scale(1);
                }
            }
            .flor{
                width: 100px;
                height: 100px;
                position: absolute;
                top: 450px;
                left: 750px;
                animation: flor 1s forwards 5.4s;
                background-image: url(img/flor.png);
                background-size: cover; 
                transform: scale(0);
            }
            @keyframes flor {
                0%{
                    top: 450px;
                    left: 275px;
                    transform: scale(0);
                }
                100%{
                    top: 450px;
                    left: 275px;
                    transform: scale(1);
                }
            }
        </style>
    </head>
    <body>
        <div class="contenedor">
            <div class="palmeras">

            </div>
            <div class="text1">
                <h1> YA PROBASTE </h1>
            </div>
            <div class="text2">
                <h1> EL NUEVO </h1>
            </div>
            <div class="text3">
                <h1> SABOR</h1>
            </div>
            <div class="coco1">
            
            </div>
            <div class="coco2">
            
            </div>
            <div class="coco3">
            
            </div>
            <div class="coco4">
            
            </div>
            <div class="coco5">
            
            </div>
            <div class="t1">
                <h1> COCO </h1>
            </div>
            <div class="t2">
                <h1> + </h1>
            </div>
            <div class="t3">
                <h1> VAINILLA </h1>
            </div>
            <div class="coco6">
            
            </div>
            <div class="flor">
            
            </div>
        </div>

    </body>
</html>
